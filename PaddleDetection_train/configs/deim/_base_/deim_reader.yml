worker_num: 4
TrainReader:
  sample_transforms:
    - Decode: {}
    - RandomSelect:
        transforms1:
          - Mosaic:
              input_dim: [320, 320]
              output_dim: [640, 640]
              centered_affine: True
              center_ratio_range: [1.0, 1.0]
              remove_outside_box: True
              pad_val: 0
              degrees: [-10, 10]
              scale: [0.5, 1.5]
              shear: [0, 0]
              translate: [-0.1, 0.1]
              border_value: [0, 0, 0]
              enable_mixup: False
          - RandomDistort: {prob: 0.8}
        transforms2:
          - Mosaic: {prob: 0.0}
          - RandomDistort: {prob: 0.8}
          - RandomExpand: {fill_value: [0., 0., 0.]}
          - RandomCrop: {prob: 0.8}
    # use RandomSelects as a group
    - RandomSelects:
        transforms_list:
          - - RandomDistort: {prob: 0.8}
            - RandomExpand: {fill_value: [0., 0., 0.]}
            - RandomCrop: {prob: 0.8}
    - RandomFlip: {}
    - Resize: {target_size: [640, 640], keep_ratio: False, interp: 1}
  batch_transforms:
    - BatchRandomResize: {target_size: [
        480, 512, 544, 576, 608,
        640, 640, 640,  # 3x
        672, 704, 736, 768, 800], random_size: True, random_interp: True, keep_ratio: False}
    - NormalizeImage: {mean: [0., 0., 0.], std: [1., 1., 1.], norm_type: none}
    - NormalizeBox: {}
    - BboxXYXY2XYWH: {}
    - Permute: {}
    - MixupBatch: {ratio_range: [0.45, 0.55], prob: 0.5}
  mosaic_start_epoch: 4
  mosaic_epoch: 34
  batch_size: 4
  shuffle: true
  drop_last: true
  collate_batch: false
  use_shared_memory: true
  transform_schedulers:
    # [start_epoch, stop_epoch) | [0, stop_epoch) | [start_epoch, inf)
    - RandomSelect: {start_epoch: 4, stop_epoch: 34}
    - RandomSelects: {start_epoch: 34, stop_epoch: 58}
    - Resize: {start_epoch: 58}
    - BatchRandomResize: {stop_epoch: 58}
    - MixupBatch: {start_epoch: 4, stop_epoch: 58}

EvalReader:
  sample_transforms:
    - Decode: {}
    - Resize: {target_size: [640, 640], keep_ratio: False, interp: 1}
    - NormalizeImage: {mean: [0., 0., 0.], std: [1., 1., 1.], norm_type: none}
    - Permute: {}
  batch_size: 4
  shuffle: false
  drop_last: false


TestReader:
  inputs_def:
    image_shape: [3, 640, 640]
  sample_transforms:
    - Decode: {}
    - Resize: {target_size: [640, 640], keep_ratio: False, interp: 1}
    - NormalizeImage: {mean: [0., 0., 0.], std: [1., 1., 1.], norm_type: none}
    - Permute: {}
  batch_size: 1
  shuffle: false
  drop_last: false
