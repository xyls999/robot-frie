_BASE_: [
  '../ppyoloe/ppyoloe_plus_crn_s_80e_coco.yml',
]

# FireDetect clean holdout protocol - final conservative config.
# Train on the fixed 355-image train pool and evaluate on the 50-image
# permanent holdout. Do not initialize from any all405-trained model.

log_iter: 10
snapshot_epoch: 10
save_dir: output/firedetect_ppyoloe_plus_crn_s_220e_736_clean_holdout_final355
weights: output/firedetect_ppyoloe_plus_crn_s_220e_736_clean_holdout_final355/model_final

pretrain_weights: https://bj.bcebos.com/v1/paddledet/models/pretrained/ppyoloe_crn_s_obj365_pretrained.pdparams

metric: COCO
num_classes: 3

TrainDataset:
  name: COCODataSet
  image_dir: images
  anno_path: annotations/holdout_kfold/train_pool.json
  dataset_dir: dataset/firedetect
  allow_empty: true
  empty_ratio: 0.8
  data_fields: ['image', 'gt_bbox', 'gt_class', 'is_crowd']

EvalDataset:
  name: COCODataSet
  image_dir: images
  anno_path: annotations/holdout_kfold/holdout.json
  dataset_dir: dataset/firedetect
  allow_empty: true

TestDataset:
  name: ImageFolder
  anno_path: annotations/holdout_kfold/holdout.json
  dataset_dir: dataset/firedetect

worker_num: 0
eval_height: &eval_height 736
eval_width: &eval_width 736
eval_size: &eval_size [*eval_height, *eval_width]

TrainReader:
  sample_transforms:
    - Decode: {}
    - RandomDistort: {prob: 0.18}
    - RandomFlip: {prob: 0.5}
  batch_transforms:
    - BatchRandomResize: {target_size: [704, 736, 768], random_size: true, random_interp: true, keep_ratio: false}
    - NormalizeImage: {mean: [0., 0., 0.], std: [1., 1., 1.], norm_type: none}
    - Permute: {}
    - PadGT: {}
  batch_size: 4
  shuffle: true
  drop_last: true
  use_shared_memory: false
  collate_batch: true

EvalReader:
  sample_transforms:
    - Decode: {}
    - Resize: {target_size: *eval_size, keep_ratio: false, interp: 2}
    - NormalizeImage: {mean: [0., 0., 0.], std: [1., 1., 1.], norm_type: none}
    - Permute: {}
  batch_size: 1

TestReader:
  inputs_def:
    image_shape: [3, *eval_height, *eval_width]
  sample_transforms:
    - Decode: {}
    - Resize: {target_size: *eval_size, keep_ratio: false, interp: 2}
    - NormalizeImage: {mean: [0., 0., 0.], std: [1., 1., 1.], norm_type: none}
    - Permute: {}
  batch_size: 1

epoch: 220

LearningRate:
  base_lr: 0.00030
  schedulers:
    - name: CosineDecay
      max_epochs: 220
    - name: LinearWarmup
      start_factor: 0.
      epochs: 3

OptimizerBuilder:
  optimizer:
    momentum: 0.9
    type: Momentum
  regularizer:
    factor: 0.0002
    type: L2

PPYOLOEHead:
  static_assigner_epoch: 25
  loss_weight: {class: 1.22, iou: 2.7, dfl: 0.85}
  assigner:
    name: TaskAlignedAssigner
    topk: 15
    alpha: 1.0
    beta: 6.0
  nms:
    name: MultiClassNMS
    nms_top_k: 1200
    keep_top_k: 400
    score_threshold: 0.001
    nms_threshold: 0.75
